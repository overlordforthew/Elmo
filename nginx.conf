server {
    listen 80;
    server_name onlydrafting.com www.onlydrafting.com;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect www to non-www
    if ($host = www.onlydrafting.com) {
        return 301 https://onlydrafting.com$request_uri;
    }

    # Hide nginx version
    server_tokens off;

    # Gzip compression (fallback for clients without brotli support)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/manifest+json
        image/svg+xml;

    # Security headers (server-level)
    include /etc/nginx/security-headers.conf;

    # HTML pages — force fresh fetch every time
    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        include /etc/nginx/security-headers.conf;
    }

    # Cache static assets (1 day with revalidation)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|json|webp|avif)$ {
        add_header Cache-Control "public, max-age=86400" always;
        include /etc/nginx/security-headers.conf;
    }

    # Cache robots.txt
    location = /robots.txt {
        expires 7d;
        log_not_found off;
    }

    # Cache sitemap
    location = /sitemap.xml {
        expires 1d;
    }

    # Favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
