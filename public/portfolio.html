function ImageCarousel({ images, gradient, icon, height, radius }) {
  const imgs = (images || []).filter(Boolean);
  const [idx, setIdx] = React.useState(0);
  const multi = imgs.length > 1;
  const arrowBtn = (dir) => ({
    position: "absolute", top: "50%", transform: "translateY(-50%)",
    [dir === -1 ? "left" : "right"]: 8,
    background: "rgba(255,255,255,0.88)", border: "none",
    borderRadius: "50%", width: 30, height: 30,
    cursor: "pointer", fontSize: 18, zIndex: 3,
    display: "flex", alignItems: "center", justifyContent: "center",
    boxShadow: "0 2px 8px rgba(0,0,0,0.15)", lineHeight: 1,
  });
  return (
    <div style={{ position: "relative", height, width: "100%", overflow: "hidden", borderRadius: radius || 0,
      background: imgs.length ? "#f0f0f0" : gradient,
      display: "flex", alignItems: "center", justifyContent: "center" }}>
      {imgs.length > 0
        ? <img src={imgs[idx]} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", borderRadius: radius || 0, display: "block" }} />
        : <span style={{ fontSize: 48, opacity: 0.3 }}>{icon}</span>
      }
      {multi && <>
        <button style={arrowBtn(-1)}
          onClick={(e) => { e.stopPropagation(); setIdx((idx - 1 + imgs.length) % imgs.length); }}>‹</button>
        <button style={arrowBtn(1)}
          onClick={(e) => { e.stopPropagation(); setIdx((idx + 1) % imgs.length); }}>›</button>
        <div style={{ position: "absolute", bottom: 10, left: "50%", transform: "translateX(-50%)",
          display: "flex", gap: 5, zIndex: 3 }}>
          {imgs.map((_, i) => (
            <div key={i}
              onClick={(e) => { e.stopPropagation(); setIdx(i); }}
              style={{ width: i === idx ? 18 : 6, height: 6, borderRadius: 3,
                background: i === idx ? "white" : "rgba(255,255,255,0.55)",
                cursor: "pointer", transition: "width 0.25s, background 0.25s",
                boxShadow: "0 1px 3px rgba(0,0,0,0.3)" }} />
          ))}
        </div>
      </>}
    </div>
  );
}

      display: "grid", gridTemplateColumns: "1fr 1fr 1fr",
      gap: 16, margin: "20px 0",
      padding: "20px 0",
      borderTop: "1px solid #F0F6FB",
      borderBottom: "1px solid #F0F6FB",
    },
    detailLabel: {
      fontSize: 11, fontWeight: 600, letterSpacing: 0.5,
      color: "#A3BDCE", marginBottom: 4,
    },
    detailVal: {
      fontSize: 15, fontWeight: 600, color: "#1C3A52",
    },
    ctaBanner: {
      background: "linear-gradient(135deg, #EAF4FB 0%, #DFF0EA 50%, #FAE8E0 100%)",
      borderRadius: 14, padding: "28px 24px",
      textAlign: "center", marginTop: 24,
      border: "1px solid #E2EBF0",
    },
    btnPrimary: {
      display: "inline-block",
      padding: "13px 28px",
      background: "linear-gradient(135deg, #2B88BF, #5BA4D4)",
      color: "white", border: "none", borderRadius: 10,
      fontFamily: "'Plus Jakarta Sans', sans-serif",
      fontSize: 14, fontWeight: 600, cursor: "pointer",
      boxShadow: "0 4px 18px rgba(43,136,191,0.25)",
      textDecoration: "none", transition: "transform 0.2s",
    },
    emptyState: {
      textAlign: "center", padding: "60px 20px",
      background: "white", borderRadius: 16,
      border: "1px solid #E2EBF0",
    },
  };

  return (
    <div style={s.wrap}>
      <style>{css}</style>

      {/* HEADER */}
      <div style={s.header}>
        <div style={s.logoRow}>
          <img src="/logo.jpg" alt="Pacific Bim Engineering Services" style={s.logoMark} />
          <div>
            <div style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 700, color: "#1C3A52" }}>Pacific Bim</div>
            <div style={{ fontSize: 9, letterSpacing: 2, color: "#2B88BF", textTransform: "uppercase", fontWeight: 600 }}>Engineering Services</div>
          </div>
        </div>
        <h1 style={s.title}>Project Portfolio</h1>
        <p style={s.subtitle}>
          Real projects. Real permits. Real results across Hawai'i.
          Browse our completed work filtered by project type and service.
        </p>

        <div style={s.statsRow}>
          {[
            { num: stats.total, label: "Projects Completed" },
            { num: "100%", label: "Approval Rate" },
            { num: stats.locations, label: "Locations Served" },
          ].map((st, i) => (
            <div key={i} style={{ textAlign: "center" }}>
              <div style={s.statNum}>{st.num}</div>
              <div style={s.statLabel}>{st.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* BODY */}
      <div style={s.body}>
        {/* FILTERS */}
        <div style={s.filterBar}>
          <span style={s.filterLabel}>Type</span>
          {PROJECT_TYPES.map(t => (
            <button key={t} className="filter-btn" style={s.filterBtn(typeFilter === t)}
              onClick={() => setTypeFilter(t)}>
              {t === "All" ? "All Types" : t}
            </button>
          ))}
          <div style={s.filterDivider} />
          <span style={s.filterLabel}>Service</span>
          {SERVICES.map(sv => (
            <button key={sv} className="filter-btn" style={s.filterBtn(serviceFilter === sv)}
              onClick={() => setServiceFilter(sv)}>
              {sv === "All" ? "All Services" : sv}
            </button>
          ))}
        </div>

        {/* COUNT */}
        <div style={{ fontSize: 13, color: "#A3BDCE", marginBottom: 18, fontWeight: 500 }}>
          Showing {filtered.length} of {PROJECTS.length} projects
        </div>

        {/* GRID */}
        {filtered.length === 0 ? (
          <div style={s.emptyState}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>{"\u{1F50D}"}</div>
            <h3 style={{ fontFamily: "'Lora', serif", fontSize: 20, color: "#1C3A52", marginBottom: 8 }}>No projects match these filters</h3>
            <p style={{ fontSize: 14, color: "#7A95A8" }}>Try adjusting your filter selection above.</p>
          </div>
        ) : (
          <div style={s.grid}>
            {filtered.slice(0, visibleCount).map((p, i) => (
              <div key={p.id} className="pcard" style={{ ...s.card, animation: animateIn ? `fadeUp 0.6s ease ${i * 0.08}s both` : "none" }}
                onClick={() => setSelectedProject(p)}>
                <div style={{ ...s.cardImg(p.gradient, !!p.image), padding: 0 }}>
                  <ImageCarousel images={[p.image, p.image2]} gradient={p.gradient} icon={p.icon} height={180} />
                  <div className="pcard-img-overlay" style={s.cardImgOverlay}>
                    <span style={{ color: "white", fontSize: 14, fontWeight: 600, letterSpacing: 1 }}>View Details &rarr;</span>
                  </div>
                </div>
                <div style={s.cardBody}>
                  <div>
                    <span style={s.cardType(p.type)}>{p.type}</span>
                    <span style={s.cardService}>{p.service}</span>
                  </div>
                  <h3 style={s.cardName}>{p.name}</h3>
                  <div style={s.cardMeta}>
                    <span style={s.cardMetaItem}>{"\u{1F4CD}"} {p.location}</span>
                    <span style={s.cardMetaItem}>{"\u{1F4D0}"} {p.sqft}</span>
                    <span style={s.cardMetaItem}>{"\u23F1"} {p.turnaround}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* LOAD MORE */}
        {visibleCount < filtered.length && (
          <div style={{ textAlign: "center", marginTop: 16, marginBottom: 8 }}>
            <button
              onClick={() => setVisibleCount(v => v + 15)}
              style={{
                background: "white",
                border: "2px solid #2B88BF",
                color: "#1A6B9C",
                padding: "12px 36px",
                borderRadius: 10,
                fontSize: 15,
                fontWeight: 600,
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                cursor: "pointer",
                letterSpacing: 0.3,
                transition: "all 0.25s",
              }}
              onMouseOver={e => { e.currentTarget.style.background="#2B88BF"; e.currentTarget.style.color="white"; }}
              onMouseOut={e => { e.currentTarget.style.background="white"; e.currentTarget.style.color="#1A6B9C"; }}
            >
              Show More Projects ({filtered.length - visibleCount} remaining)
            </button>
          </div>
        )}

        {/* BOTTOM CTA */}
        <div style={s.ctaBanner}>
          <h3 style={{ fontFamily: "'Lora', serif", fontSize: 22, color: "#1C3A52", marginBottom: 8 }}>
            Ready to add your project to this list?
          </h3>
          <p style={{ fontSize: 14, color: "#7A95A8", marginBottom: 20, maxWidth: 400, margin: "0 auto 20px" }}>
            Get a free estimate and see how Pacific Bim Engineering can handle your next permit.
          </p>
          <a href="mailto:elmoherrera2014@gmail.com" style={s.btnPrimary}>
            Start Your Project &rarr;
          </a>
        </div>
      </div>

      {/* MODAL */}
      {selectedProject && (
        <div className="modal-backdrop" style={s.backdrop} onClick={(e) => { if (e.target === e.currentTarget) setSelectedProject(null); }}>
          <div className="modal-content" style={s.modal}>
            <div style={{ position: "relative" }}>
              <ImageCarousel images={[selectedProject.image, selectedProject.image2]} gradient={selectedProject.gradient} icon={selectedProject.icon} height={260} radius="20px 20px 0 0" />
              <button style={s.modalClose} onClick={() => setSelectedProject(null)}
                onMouseOver={e => e.currentTarget.style.background="rgba(255,255,255,0.35)"}
                onMouseOut={e => e.currentTarget.style.background="rgba(255,255,255,0.2)"}>
                {"\u2715"}
              </button>
            </div>
            <div style={s.modalBody}>
              <div style={{ marginBottom: 12 }}>
                <span style={s.cardType(selectedProject.type)}>{selectedProject.type}</span>
                <span style={s.cardService}>{selectedProject.service}</span>
                <span style={{ ...s.cardService, background: "#DFF0EA", color: "#2D8C6E", marginLeft: 8 }}>{"\u2713"} {selectedProject.status}</span>
              </div>
              <h2 style={{ fontFamily: "'Lora', serif", fontSize: 26, fontWeight: 700, color: "#1C3A52", marginBottom: 6, lineHeight: 1.2 }}>
                {selectedProject.name}
              </h2>

              <div style={s.detailGrid}>
                {[
                  ["Location", `\u{1F4CD} ${selectedProject.location}`],
                  ["Size", `\u{1F4D0} ${selectedProject.sqft}`],
                  ["Turnaround", `\u23F1 ${selectedProject.turnaround}`],
                  ["Year", `\u{1F4C5} ${selectedProject.year}`],
                  ["Status", `\u2705 ${selectedProject.status}`],
                  ["Service", selectedProject.service],
                ].map(([label, val]) => (
                  <div key={label}>
                    <div style={s.detailLabel}>{label}</div>
                    <div style={s.detailVal}>{val}</div>
                  </div>
                ))}
              </div>

              <p style={{ fontSize: 15, lineHeight: 1.75, color: "#3D5468", marginBottom: 20 }}>
                {selectedProject.description}
              </p>

              <div style={{ marginBottom: 4 }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#A3BDCE", marginBottom: 10 }}>Highlights</div>
                {selectedProject.highlights.map((h, i) => (
                  <span key={i} className="highlight-tag" style={s.highlightTag}>{h}</span>
                ))}
              </div>

              <div style={{ ...s.ctaBanner, marginTop: 28 }}>
                <p style={{ fontSize: 15, fontWeight: 600, color: "#1C3A52", marginBottom: 14 }}>
                  Have a similar project?
                </p>
                <a href="mailto:elmoherrera2014@gmail.com" style={s.btnPrimary}>Get a Free Quote &rarr;</a>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* FOOTER */}
      <div style={{ textAlign: "center", padding: "0 20px 40px", fontSize: 12, color: "#A3BDCE" }}>
        {"\u{1F33A}"} Pacific Bim Engineering Services {"\u00B7"} Hawai'i {"\u00B7"} <a href="https://wa.me/639294142510" target="_blank" rel="noopener noreferrer" style={{ color: "#2B88BF", textDecoration: "none" }}>WhatsApp</a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Portfolio />);
  </script>
  <script>
    window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 30));
    document.getElementById('navToggle').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));
    document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open')));
  </script>
</body>
</html>
