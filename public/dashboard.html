    }
    .logo-mark::after {
      content: ''; position: absolute; top: 0; left: -100%;

      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);

// Login Screen
function LoginScreen({ onLogin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [error, setError] = useState("");
  const [focused, setFocused] = useState(null);

  const handleLogin = () => {
    if (user === "demo" && pass === "demo") {
      onLogin(DEMO_FIRMS["demo"]);
    } else {
      setError("Invalid credentials. Try demo / demo");
    }
  };

  return (
    <div style={styles.loginWrap}>
      <div style={styles.loginCard}>
        <div style={styles.loginLogo}>
          <div style={styles.logoMark}>EES</div>
          <div>
            <div style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 700, color: "#1C3A52" }}>Elite</div>
            <div style={{ fontSize: 9, letterSpacing: 2, color: "#2B88BF", textTransform: "uppercase", fontWeight: 600 }}>Engineering Services</div>
          </div>
        </div>
        <h1 style={styles.loginTitle}>Firm Portal</h1>
        <p style={styles.loginSub}>Track your projects, download plans, and submit new work.</p>

        <input
          style={{ ...styles.input, borderColor: focused === "user" ? "#5BA4D4" : "#E2EBF0" }}
          placeholder="Username"
          value={user}
          onChange={e => { setUser(e.target.value); setError(""); }}
          onFocus={() => setFocused("user")}
          onBlur={() => setFocused(null)}
          onKeyDown={e => e.key === "Enter" && handleLogin()}
        />
        <input
          style={{ ...styles.input, borderColor: focused === "pass" ? "#5BA4D4" : "#E2EBF0" }}
          placeholder="Password"
          type="password"
          value={pass}
          onChange={e => { setPass(e.target.value); setError(""); }}
          onFocus={() => setFocused("pass")}
          onBlur={() => setFocused(null)}
          onKeyDown={e => e.key === "Enter" && handleLogin()}
        />

        {error && <div style={{ color: "#B85C3A", fontSize: 13, marginBottom: 12, fontWeight: 500 }}>{error}</div>}

// ePlans Stage Tracker
function EplansTracker({ currentStage }) {
  const currentIdx = EPLANS_STAGES.findIndex(s => s.key === currentStage);
  return (
    <div style={styles.stageTracker}>
      <div style={styles.stageLine} />
      {EPLANS_STAGES.map((stage, i) => {
        const isPast = i < currentIdx;
        const isActive = i === currentIdx;
        return (
          <div key={stage.key} style={styles.stageItem(isActive, isPast)}>
            <div style={styles.stageDot(isActive, isPast)}>
              {isPast ? "\u2713" : stage.icon}
            </div>
            <span style={styles.stageLabel(isActive)}>{stage.label}</span>
          </div>
        );
      })}
    </div>
  );
}
